spring.application.name=Spring_Stigespill

# ==========================================
# 1. DATABASE (Skolenettet)
# ==========================================
spring.datasource.url=jdbc:postgresql://ider-database.westeurope.cloudapp.azure.com:5433/h186505

#spring.datasource.username=
#spring.datasource.password=

# Oppdater skjema, ikke slett
spring.jpa.hibernate.ddl-auto=update

# Last inn brettet
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 2. TOTAL STILLHET (Kill switch)
# ==========================================

# Skru av SQL-printing (Dette er synderen for "Hibernate: insert...")
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
